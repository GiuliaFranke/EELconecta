<script>
  let selectedSubjects = [];
  
  async function carregarRecomendacoes(subject) {
    try {
      const button = document.getElementById(subject);
      
      // Toggle selection
      if (selectedSubjects.includes(subject)) {
          selectedSubjects = selectedSubjects.filter(s => s !== subject);
          button.classList.remove('selected');
      } else {
          selectedSubjects.push(subject);
          button.classList.add('selected');
      }
      
      // Consulta a API
      const response = await fetch('/api/check_subjects', {
          method: 'POST',
          headers: {
              'Content-Type': 'application/json',
          },
          body: JSON.stringify({
              selected: selectedSubjects,
              course: 'eletrica'
          })
      });
      
      const data = await response.json();
      
      // Atualiza as cores dos botões
      document.querySelectorAll('button').forEach(btn => {
          btn.classList.remove('available', 'blocked');
          
          if (data.available.includes(btn.id)) {
              btn.classList.add('available');
          } else if (!selectedSubjects.includes(btn.id)) {
              btn.classList.add('blocked');
          }
      });
    } catch (error) {
        console.error("Erro ao verificar matérias:", error);
    }
}

function carregarFase(numFase) {
    const checkbox = document.querySelector(`th:nth-child(${numFase}) input[type="checkbox"]`);
    const botoes = document.querySelectorAll(`button[data-fase="${numFase}"]`);
    
    botoes.forEach(botao => {
        if (checkbox.checked !== botao.classList.contains('selected')) {
            botao.click(); // Dispara carregarRecomendacoes via onclick
        }
    });
}
</script>
